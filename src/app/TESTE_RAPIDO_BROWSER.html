<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste ImobHunter API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .test-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .test-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
        }
        
        .test-item.loading {
            border-color: #ffc107;
            background: #fff8e1;
        }
        
        .test-item.success {
            border-color: #28a745;
            background: #d4edda;
        }
        
        .test-item.error {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        .test-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .test-icon {
            font-size: 24px;
        }
        
        .test-name {
            font-weight: 600;
            font-size: 16px;
            flex: 1;
        }
        
        .test-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-loading {
            background: #ffc107;
            color: white;
        }
        
        .status-success {
            background: #28a745;
            color: white;
        }
        
        .status-error {
            background: #dc3545;
            color: white;
        }
        
        .test-url {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            word-break: break-all;
        }
        
        .test-response {
            background: white;
            border-radius: 5px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .summary {
            background: #e7f3ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .summary-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Teste ImobHunter API</h1>
        <p class="subtitle">Testando todas as Edge Functions do projeto nooknoilfqpfzujoddlp</p>
        
        <div id="summary" class="summary" style="display: none;">
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-value" id="total-tests">0</div>
                    <div class="summary-label">Total</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #28a745;" id="success-tests">0</div>
                    <div class="summary-label">✅ Sucesso</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #dc3545;" id="error-tests">0</div>
                    <div class="summary-label">❌ Erro</div>
                </div>
            </div>
        </div>
        
        <div id="tests" class="test-grid"></div>
        
        <button class="button" onclick="runTests()">🚀 Testar Todas as Rotas</button>
    </div>
    
    <script>
        const projectId = 'nooknoilfqpfzujoddlp';
        const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vb2tub2lsZnFwZnp1am9kZGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ0NTc1NjEsImV4cCI6MjA1MDAzMzU2MX0.sXc1MUlH_8PnPi9f34bOPWKmvQoCBbHTYAiKqQ5oqhU';
        
        const tests = [
            { name: 'imobhunter-api', url: `https://${projectId}.supabase.co/functions/v1/imobhunter-api` },
            { name: 'imobhunter-api/ping', url: `https://${projectId}.supabase.co/functions/v1/imobhunter-api/ping` },
            { name: 'imobhunter-api/health', url: `https://${projectId}.supabase.co/functions/v1/imobhunter-api/health` },
            { name: 'server', url: `https://${projectId}.supabase.co/functions/v1/server` },
            { name: 'server/ping', url: `https://${projectId}.supabase.co/functions/v1/server/ping` },
            { name: 'server/health', url: `https://${projectId}.supabase.co/functions/v1/server/health` },
            { name: 'make-server-9e4b8b7c/ping', url: `https://${projectId}.supabase.co/functions/v1/make-server-9e4b8b7c/ping` },
        ];
        
        async function runTests() {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('total-tests').textContent = tests.length;
            document.getElementById('success-tests').textContent = '0';
            document.getElementById('error-tests').textContent = '0';
            
            const testsContainer = document.getElementById('tests');
            testsContainer.innerHTML = '';
            
            let successCount = 0;
            let errorCount = 0;
            
            for (const test of tests) {
                const testElement = createTestElement(test);
                testsContainer.appendChild(testElement);
                
                try {
                    const response = await fetch(test.url, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${anonKey}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    let data;
                    try {
                        data = await response.json();
                    } catch (e) {
                        data = await response.text();
                    }
                    
                    if (response.ok) {
                        updateTestElement(testElement, 'success', response.status, data);
                        successCount++;
                    } else {
                        updateTestElement(testElement, 'error', response.status, data);
                        errorCount++;
                    }
                } catch (error) {
                    updateTestElement(testElement, 'error', 'NETWORK_ERROR', error.message);
                    errorCount++;
                }
                
                document.getElementById('success-tests').textContent = successCount;
                document.getElementById('error-tests').textContent = errorCount;
            }
        }
        
        function createTestElement(test) {
            const div = document.createElement('div');
            div.className = 'test-item loading';
            div.innerHTML = `
                <div class="test-header">
                    <span class="test-icon">⏳</span>
                    <span class="test-name">${test.name}</span>
                    <span class="test-status status-loading">Testando...</span>
                </div>
                <div class="test-url">${test.url}</div>
                <div class="test-response">Aguardando resposta...</div>
            `;
            return div;
        }
        
        function updateTestElement(element, status, statusCode, data) {
            element.className = `test-item ${status}`;
            
            const icon = status === 'success' ? '✅' : '❌';
            const statusClass = status === 'success' ? 'status-success' : 'status-error';
            const statusText = status === 'success' ? `${statusCode} OK` : `${statusCode}`;
            
            element.querySelector('.test-icon').textContent = icon;
            element.querySelector('.test-status').className = `test-status ${statusClass}`;
            element.querySelector('.test-status').textContent = statusText;
            
            const responseText = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
            element.querySelector('.test-response').textContent = responseText;
        }
        
        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runTests, 500);
        });
    </script>
</body>
</html>
